name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: agent_test
        ports: [5432:5432]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      AGENT_DB_URL: postgresql+asyncpg://postgres:test@localhost:5432/agent_test
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.12"
      - run: uv sync --all-extras
      - run: uv run pytest -q

  deploy:
    needs: test
    runs-on: [self-hosted, agent-peermarket]
    steps:
      - uses: actions/checkout@v4

      - name: Sync code to /opt/peermarket-agent
        run: |
          sudo rsync -a --delete --exclude .venv --exclude .git \
            ./ /opt/peermarket-agent/
          sudo chown -R peermarket-agent:peermarket-agent /opt/peermarket-agent

      - name: Install/refresh deps with uv
        run: |
          sudo -u peermarket-agent bash -c '
            cd /opt/peermarket-agent
            /usr/local/bin/uv sync --all-extras --frozen || /usr/local/bin/uv sync --all-extras
            # Playwright browser binary (idempotent — playwright skips if installed)
            /opt/peermarket-agent/.venv/bin/playwright install chromium
          '
          # System libs require root (apt-installs missing libs for Chromium)
          sudo /opt/peermarket-agent/.venv/bin/playwright install-deps chromium || true

      - name: Write secrets.env + PEM file from GitHub Secrets
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_APP_TOKEN: ${{ secrets.SLACK_APP_TOKEN }}
          SLACK_FOUNDER_USER_ID: ${{ secrets.SLACK_FOUNDER_USER_ID }}
          SLACK_AGENT_ALLOWED_USER_IDS: ${{ vars.SLACK_AGENT_ALLOWED_USER_IDS || '' }}
          SLACK_SIGNING_SECRET: ${{ secrets.SLACK_SIGNING_SECRET }}
          AGENT_DB_URL: ${{ secrets.AGENT_DB_URL }}
          PEERMARKET_PROD_DB_READONLY_URL: ${{ secrets.PEERMARKET_PROD_DB_READONLY_URL }}
          GITHUB_APP_ID: ${{ secrets.GH_APP_ID }}
          GITHUB_APP_PRIVATE_KEY_BODY: ${{ secrets.GH_APP_PRIVATE_KEY }}
          GITHUB_APP_INSTALLATION_ID: ${{ secrets.GH_APP_INSTALLATION_ID }}
          RECRAFT_API_KEY: ${{ secrets.RECRAFT_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          BACKBLAZE_B2_KEY_ID: ${{ secrets.BACKBLAZE_B2_KEY_ID }}
          BACKBLAZE_B2_APP_KEY: ${{ secrets.BACKBLAZE_B2_APP_KEY }}
          BACKBLAZE_B2_BUCKET: ${{ secrets.BACKBLAZE_B2_BUCKET }}
          BACKBLAZE_B2_ENDPOINT: ${{ secrets.BACKBLAZE_B2_ENDPOINT }}
          META_APP_ID: ${{ secrets.META_APP_ID }}
          META_APP_SECRET: ${{ secrets.META_APP_SECRET }}
          META_SYSTEM_USER_TOKEN: ${{ secrets.META_SYSTEM_USER_TOKEN }}
          META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}
          META_AUTO_ACTIVATE: ${{ vars.META_AUTO_ACTIVATE || 'false' }}
          META_PAGE_ID: ${{ secrets.META_PAGE_ID }}
          META_INSIGHTS_ENABLED: ${{ vars.META_INSIGHTS_ENABLED || 'false' }}
          PEERMARKET_ATTRIBUTION_ENABLED: ${{ vars.PEERMARKET_ATTRIBUTION_ENABLED || 'false' }}
          META_INSIGHTS_LOOKBACK_DAYS: ${{ vars.META_INSIGHTS_LOOKBACK_DAYS || '3' }}
          META_ACCOUNT_TIMEZONE: ${{ vars.META_ACCOUNT_TIMEZONE || 'Europe/Brussels' }}
          META_NO_DELIVERY_GRACE_HOURS: ${{ vars.META_NO_DELIVERY_GRACE_HOURS || '2' }}
          PERFORMANCE_SNAPSHOT_MAX_AGE_HOURS: ${{ vars.PERFORMANCE_SNAPSHOT_MAX_AGE_HOURS || '2' }}
          LEARNING_MIN_IMPRESSIONS: ${{ vars.LEARNING_MIN_IMPRESSIONS || '1000' }}
          LEARNING_MIN_LANDING_PAGE_VIEWS: ${{ vars.LEARNING_MIN_LANDING_PAGE_VIEWS || '30' }}
          LEARNING_MIN_REGISTRATIONS: ${{ vars.LEARNING_MIN_REGISTRATIONS || '10' }}
          META_AUTONOMY_ENABLED: ${{ vars.META_AUTONOMY_ENABLED || 'false' }}
          META_AUTONOMY_SHADOW: ${{ vars.META_AUTONOMY_SHADOW || 'true' }}
          META_AUTONOMY_CAMPAIGN_IDS_CSV: ${{ vars.META_AUTONOMY_CAMPAIGN_IDS_CSV || '' }}
          META_AUTONOMY_EXPERIMENT_ID: ${{ vars.META_AUTONOMY_EXPERIMENT_ID || '' }}
          META_AUTONOMY_VARIANT_COUNT: ${{ vars.META_AUTONOMY_VARIANT_COUNT || '3' }}
          META_AUTONOMY_MAX_REPLACEMENTS_24H: ${{ vars.META_AUTONOMY_MAX_REPLACEMENTS_24H || '1' }}
          META_AUTONOMY_COOLDOWN_HOURS: ${{ vars.META_AUTONOMY_COOLDOWN_HOURS || '24' }}
          META_AUTONOMY_MAX_TEST_DAYS: ${{ vars.META_AUTONOMY_MAX_TEST_DAYS || '7' }}
          META_AUTONOMY_MAX_INCREASE_PERCENT: ${{ vars.META_AUTONOMY_MAX_INCREASE_PERCENT || '20' }}
          META_AUTONOMY_MAX_DAILY_BUDGET_EUR: ${{ vars.META_AUTONOMY_MAX_DAILY_BUDGET_EUR || '20' }}
        run: |
          # Write PEM to its own file (systemd can't handle multi-line env values)
          printf '%s' "$GITHUB_APP_PRIVATE_KEY_BODY" | sudo tee /etc/peermarket-agent/github-app.pem >/dev/null
          sudo chown root:peermarket-agent /etc/peermarket-agent/github-app.pem
          sudo chmod 0640 /etc/peermarket-agent/github-app.pem

          # secrets.env contains only single-line values (systemd-compatible)
          sudo tee /etc/peermarket-agent/secrets.env >/dev/null <<EOF
          ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY
          SLACK_BOT_TOKEN=$SLACK_BOT_TOKEN
          SLACK_APP_TOKEN=$SLACK_APP_TOKEN
          SLACK_FOUNDER_USER_ID=$SLACK_FOUNDER_USER_ID
          SLACK_AGENT_ALLOWED_USER_IDS=$SLACK_AGENT_ALLOWED_USER_IDS
          SLACK_SIGNING_SECRET=$SLACK_SIGNING_SECRET
          SLACK_REPORT_CHANNEL_TIKTOK=C0BJ71Z4YFL
          SLACK_REPORT_CHANNEL_META=C0BJ0PUURRR
          SLACK_REPORT_CHANNEL_EMAIL=C0BHRLPM3QX
          AGENT_DB_URL=$AGENT_DB_URL
          PEERMARKET_PROD_DB_READONLY_URL=$PEERMARKET_PROD_DB_READONLY_URL
          GITHUB_APP_ID=$GITHUB_APP_ID
          GITHUB_APP_PRIVATE_KEY=/etc/peermarket-agent/github-app.pem
          GITHUB_APP_INSTALLATION_ID=$GITHUB_APP_INSTALLATION_ID
          RECRAFT_API_KEY=$RECRAFT_API_KEY
          GEMINI_API_KEY=$GEMINI_API_KEY
          RESEND_API_KEY=$RESEND_API_KEY
          BACKBLAZE_B2_KEY_ID=$BACKBLAZE_B2_KEY_ID
          BACKBLAZE_B2_APP_KEY=$BACKBLAZE_B2_APP_KEY
          BACKBLAZE_B2_BUCKET=$BACKBLAZE_B2_BUCKET
          BACKBLAZE_B2_ENDPOINT=$BACKBLAZE_B2_ENDPOINT
          META_APP_ID=$META_APP_ID
          META_APP_SECRET=$META_APP_SECRET
          META_SYSTEM_USER_TOKEN=$META_SYSTEM_USER_TOKEN
          META_AD_ACCOUNT_ID=$META_AD_ACCOUNT_ID
          META_AUTO_ACTIVATE=$META_AUTO_ACTIVATE
          META_PAGE_ID=$META_PAGE_ID
          META_INSIGHTS_ENABLED=$META_INSIGHTS_ENABLED
          PEERMARKET_ATTRIBUTION_ENABLED=$PEERMARKET_ATTRIBUTION_ENABLED
          META_INSIGHTS_LOOKBACK_DAYS=$META_INSIGHTS_LOOKBACK_DAYS
          META_ACCOUNT_TIMEZONE=$META_ACCOUNT_TIMEZONE
          META_NO_DELIVERY_GRACE_HOURS=$META_NO_DELIVERY_GRACE_HOURS
          PERFORMANCE_SNAPSHOT_MAX_AGE_HOURS=$PERFORMANCE_SNAPSHOT_MAX_AGE_HOURS
          LEARNING_MIN_IMPRESSIONS=$LEARNING_MIN_IMPRESSIONS
          LEARNING_MIN_LANDING_PAGE_VIEWS=$LEARNING_MIN_LANDING_PAGE_VIEWS
          LEARNING_MIN_REGISTRATIONS=$LEARNING_MIN_REGISTRATIONS
          META_AUTONOMY_ENABLED=$META_AUTONOMY_ENABLED
          META_AUTONOMY_SHADOW=$META_AUTONOMY_SHADOW
          META_AUTONOMY_CAMPAIGN_IDS_CSV=$META_AUTONOMY_CAMPAIGN_IDS_CSV
          META_AUTONOMY_EXPERIMENT_ID=$META_AUTONOMY_EXPERIMENT_ID
          META_AUTONOMY_VARIANT_COUNT=$META_AUTONOMY_VARIANT_COUNT
          META_AUTONOMY_MAX_REPLACEMENTS_24H=$META_AUTONOMY_MAX_REPLACEMENTS_24H
          META_AUTONOMY_COOLDOWN_HOURS=$META_AUTONOMY_COOLDOWN_HOURS
          META_AUTONOMY_MAX_TEST_DAYS=$META_AUTONOMY_MAX_TEST_DAYS
          META_AUTONOMY_MAX_INCREASE_PERCENT=$META_AUTONOMY_MAX_INCREASE_PERCENT
          META_AUTONOMY_MAX_DAILY_BUDGET_EUR=$META_AUTONOMY_MAX_DAILY_BUDGET_EUR
          EOF
          sudo chown root:peermarket-agent /etc/peermarket-agent/secrets.env
          sudo chmod 0640 /etc/peermarket-agent/secrets.env

      - name: Restart services
        run: |
          sudo -u peermarket-agent bash -c '
            set -euo pipefail
            set -a
            source /etc/peermarket-agent/secrets.env
            set +a
            cd /opt/peermarket-agent
            /opt/peermarket-agent/.venv/bin/peermarket-migrate
            if [[ -n "${META_AUTONOMY_EXPERIMENT_ID:-}" ]]; then
              /opt/peermarket-agent/.venv/bin/peermarket-performance prepare-hook-experiment --draft-id 156 --seed draft-156-shadow-v1
            fi
          '
          sudo systemctl restart marketing-agent.service slack-bridge.service
          sleep 5
          sudo systemctl is-active marketing-agent.service
          sudo systemctl is-active slack-bridge.service

      - name: Smoke test — healthz
        run: |
          for i in 1 2 3 4 5; do
            if curl -fsS http://127.0.0.1:8090/agent/healthz | grep -q '"status":"ok"'; then
              echo "healthz OK"; exit 0
            fi
            sleep 2
          done
          echo "healthz failed after 5 retries"; exit 1

      - name: Verify hook experiment shadow canary
        if: ${{ vars.META_AUTONOMY_EXPERIMENT_ID != '' && vars.META_AUTONOMY_ENABLED == 'true' && vars.META_AUTONOMY_SHADOW == 'true' }}
        env:
          EXPECTED_EXPERIMENT_ID: ${{ vars.META_AUTONOMY_EXPERIMENT_ID }}
          EXPECTED_MIN_IMPRESSIONS: ${{ vars.LEARNING_MIN_IMPRESSIONS || '1000' }}
          EXPECTED_MIN_LANDING_PAGE_VIEWS: ${{ vars.LEARNING_MIN_LANDING_PAGE_VIEWS || '30' }}
          EXPECTED_MIN_REGISTRATIONS: ${{ vars.LEARNING_MIN_REGISTRATIONS || '10' }}
          EXPECTED_COOLDOWN_HOURS: ${{ vars.META_AUTONOMY_COOLDOWN_HOURS || '24' }}
          EXPECTED_MAX_TEST_DAYS: ${{ vars.META_AUTONOMY_MAX_TEST_DAYS || '7' }}
          EXPECTED_MAX_REPLACEMENTS_24H: ${{ vars.META_AUTONOMY_MAX_REPLACEMENTS_24H || '1' }}
          EXPECTED_MAX_INCREASE_PERCENT: ${{ vars.META_AUTONOMY_MAX_INCREASE_PERCENT || '20' }}
          EXPECTED_MAX_DAILY_BUDGET_EUR: ${{ vars.META_AUTONOMY_MAX_DAILY_BUDGET_EUR || '20' }}
        run: |
          set -euo pipefail
          report="$(sudo -u peermarket-agent bash -c '
            set -a
            source /etc/peermarket-agent/secrets.env
            set +a
            cd /opt/peermarket-agent
            /opt/peermarket-agent/.venv/bin/peermarket-performance autonomy --draft-id 156
          ')"
          cd /opt/peermarket-agent
          REPORT="$report" /opt/peermarket-agent/.venv/bin/python - <<'PY'
          import json, os
          from peermarket_agent.cli_performance import classify_experiment_reason
          report = json.loads(os.environ["REPORT"])
          experiment = report["hook_experiment"]
          experiment_id = os.environ["EXPECTED_EXPERIMENT_ID"]
          assert experiment["experiment_id"] == experiment_id
          expected = [f"{experiment_id}:{number:02}" for number in (1, 2, 3)]
          actual = [item["variant_id"] for item in experiment["variants"]]
          assert report["draft_id"] == 156
          assert report["feature_flags"] == {"enabled": True, "shadow": True, "allowlisted": True}
          if not experiment["ready"]:
              # A missing multilingual baseline is an expected safe state:
              # Jarvis has sent the founder a proposal and Meta remains untouched.
              assert experiment["blocked_reason"] == "variant_ids_mismatch"
              print("proposal_pending: Jarvis must receive baseline approval before canary creation")
              raise SystemExit(0)
          assert experiment["variant_count"] == 3 and actual == expected
          assert experiment["fixed_identity_match"] and experiment["ready"]
          evidence = report["experiment_evidence"]
          assert classify_experiment_reason(evidence["reason"]) in {"neutral", "qualified"}
          assert evidence["variant_ids"] == expected and len(evidence["samples"]) == 3
          assert evidence["window"] and evidence["thresholds"]
          assert evidence["delivery_state"] == "healthy" and evidence["attribution_complete"] is True
          limits = evidence["thresholds"]
          assert limits["min_impressions"] == int(os.environ["EXPECTED_MIN_IMPRESSIONS"])
          assert limits["min_landing_page_views"] == int(os.environ["EXPECTED_MIN_LANDING_PAGE_VIEWS"])
          assert limits["min_registrations"] == int(os.environ["EXPECTED_MIN_REGISTRATIONS"])
          assert limits["cooldown_hours"] == int(os.environ["EXPECTED_COOLDOWN_HOURS"])
          assert limits["max_test_days"] == int(os.environ["EXPECTED_MAX_TEST_DAYS"])
          assert limits["max_replacements_24h"] == int(os.environ["EXPECTED_MAX_REPLACEMENTS_24H"])
          assert limits["max_increase_percent"] == int(os.environ["EXPECTED_MAX_INCREASE_PERCENT"])
          assert limits["max_daily_budget_cents"] == int(os.environ["EXPECTED_MAX_DAILY_BUDGET_EUR"]) * 100
          assert report["active_action_count"] == 0 and report["active_action_statuses"] == []
          audit = report["slack_audit"]
          assert audit and audit["status"] in {"pending", "delivered"} and int(audit["id"]) > 0
          assert audit["decision_id"] == report["decision"]["id"]
          assert audit["idempotency_key"].startswith("autonomy:")
          assert audit["experiment_id"] == experiment_id
          assert audit["variant_ids"] == expected
          assert audit["evidence_window"] == evidence["window"]
          PY
